<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 72" role="img" aria-label="Facsim">
  <title>Facsim</title>
  <!-- Mark: two offset sheets — a facsimile / faithful copy. -->
  <rect x="26" y="20" width="32" height="38" rx="7" fill="#ba9965"/>
  <rect x="16" y="14" width="32" height="38" rx="7" fill="#fbf5f2" stroke="#333232" stroke-width="2.5"/>
  <rect x="22" y="23" width="20" height="2.6" rx="1.3" fill="#333232"/>
  <rect x="22" y="30" width="20" height="2.6" rx="1.3" fill="#333232"/>
  <rect x="22" y="37" width="12" height="2.6" rx="1.3" fill="#ba9965"/>
  <!-- Wordmark -->
  <text x="72" y="44" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="34" letter-spacing="-0.5" fill="#333232"
        textLength="140" lengthAdjust="spacingAndGlyphs">Facsim</text>
  <rect x="72" y="54" width="38" height="3" rx="1.5" fill="#ba9965"/>
</svg>
